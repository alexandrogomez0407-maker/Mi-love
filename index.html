<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Repaso de Programación</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            padding: 40px;
            /* Esto ayuda a que el contenido fluya hacia abajo */
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        .contenido-principal {
            flex-grow: 1; /* Empuja lo que esté debajo hacia el final */
        }

        .imagen-pequena {
            width: 150px; /* Aquí puedes ajustar qué tan pequeña la quieres */
            height: auto;
            border: 1px solid white;
            margin-top: 30px;
            align-self: center; /* La centra horizontalmente */
        }
    </style>
</head>
<body>

    <div class="contenido-principal">
        <h1>Te amo mucho mi vida🖤</h1>
        <p>No permitire que la distancia me niegue hacerte sentir mi amor...</p>
    </div>

    <img src="amor.jpg" 
         alt="Descripción de mi imagen" 
         class="imagen-pequena">

</body>
</body>
